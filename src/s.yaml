edition: 1.0.0
name: fc-stable-diffusion
access: default
vars:
  region: "{{ region }}" 
  serviceName: "{{ serviceName }}"
  functionName: "{{ functionName }}" 
  imageUrl: "registry.{{region}}.aliyuncs.com/aliyun-fc/fc-stable-diffusion:{{ if type === '动漫风格' }}anime-v1{{ else if type === '真人风格'}}realman-v1{{ else }}sd1.5-v1{{/if}}" 
  filemgrToken: "{{ filemgrToken }}"
  extraArgs: "{{ extraArgs }}{{ if ! webuiEnabled }} --nowebui{{/if}}{{ if webuiAuth !== '' }} --gradio-auth {{webuiAuth}}{{/if}}{{ if apiEnabled }} --api{{/if}}{{ if apiAuth !== '' }} --api-auth {{apiAuth}}{{/if}}"
  service:
    name: ${vars.serviceName}
    description: 'stable-diffusion部署到函数计算'
    internetAccess: true
    nasConfig: "{{ if nasEnabled }}auto{{else}}false{{/fi}}"
services:
  stable-diffusion:
    component: fc
    props:
      region: ${vars.region}
      service: ${vars.service}
      function:
        name: ${vars.functionName}
        handler: index.handler
        timeout: 600
        diskSize: 512
        caPort: 7860
        instanceType: fc.gpu.tesla.1
        runtime: custom-container
        cpu: 8
        customContainerConfig:
          args: ''
          accelerationType: Default
          image: ${vars.imageUrl}
          accelerationInfo:
            status: Preparing
          command: ''
          webServerMode: true
        instanceConcurrency: 100
        memorySize: 32768
        environmentVariables: {}
        gpuMemorySize: 16384
        asyncConfiguration: {}
      triggers:
        - name: defaultTrigger
          description: ''
          type: http
          qualifier: LATEST
          config:
            methods:
              - GET
              - POST
              - PUT
              - DELETE
            authType: anonymous
            disableURLInternet: false
      customDomains:
        - domainName: auto
          protocol: HTTP
          routeConfigs:
            - path: /*
  filemgr:
    component: fc 
    actions: 
      post-deploy: 
        - component: fc ondemand put --qualifier LATEST --max 1
    props:
      region: ${vars.region}
      service: ${vars.service}
      function:
        name: "filemgr"
        description: 'FC 文件管理器'
        codeUri: './code/filemgr'
        runtime: custom
        timeout: 7200
        memorySize: 3072
        cpu: 2.0
        diskSize: 512
        instanceConcurrency: 16
        caPort: 9000
        customRuntimeConfig:
          command:
            - ./server
        environmentVariables:
          TOKEN: ${vars.filemgrToken}
      triggers:
        - name: httpTrigger
          type: http
          config:
            authType: anonymous
            methods:
              - GET
              - POST
              - PUT
              - DELETE
              - HEAD
              - OPTIONS
      customDomains:
        - domainName: auto
          protocol: HTTP
          routeConfigs:
            - path: /*